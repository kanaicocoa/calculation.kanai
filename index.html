<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社内用 売価計算システム</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f3f3f3;
      color: #111;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
  margin: 0 auto 20px auto;
  font-size: 28px;
  max-width: 860px;
}

   .top-form {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 12px;
  max-width: 860px;
  margin: 0 auto 28px auto;
}

.reset-button {
  display: block;
  margin: 10px auto 20px auto;
  padding: 10px 22px;
  font-size: 16px;
  font-weight: 600;
  border: 2px solid #111;
  background: #fff;
  cursor: pointer;
}

.reset-button:hover {
  background: #111;
  color: #fff;
}

    .form-label,
    .form-input {
      background: #fff;
      border: 2px solid #bfbfbf;
      min-height: 58px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 22px;
    }

    .form-label {
      font-weight: 700;
      justify-content: center;
    }

    .form-input select,
    .form-input input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 22px;
      background: transparent;
    }

  .shirt-area {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: center;
  margin-bottom: 32px;
}

    .shirt-card {
      position: relative;
      width: 420px;
    }

    .shirt-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
    }

    .shirt-image-wrap {
      position: relative;
      width: 100%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    .shirt-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .overlay-select {
      position: absolute;
      width: 110px;
      height: 40px;
      border: 2px solid #222;
      background: rgba(255, 255, 255, 0.96);
      font-size: 14px;
      padding: 2px 4px;
    }

    .front-center         { top: 150px; left: 135px; width: 130px; }
    .back-center          { top: 70px; left: 135px; width: 130px; }
    .front-left-chest     { top: 80px; left: 130px; }
    .front-right-chest    { top: 80px; right: 130px; }
    .front-left-shoulder  { top: 75px; left: 20px; }
    .front-right-shoulder { top: 75px; right: 20px; }
    

 .summary {
  max-width: 760px;
  margin: 18px auto 0;
  padding-top: 16px;
  border-top: 3px solid #333;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  justify-content: center;
}

.summary-card {
  background: #e9e9e9;
  border-radius: 12px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 14px 12px;
}

.summary-card-sale {
  background: #ffe92f;
}

.summary-card-label {
  font-size: 15px;
  font-weight: 600;
  color: #666;
  margin-bottom: 6px;
  text-align: center;
}

.summary-card-value {
  font-size: 36px;
  font-weight: 800;
}

.cost-note {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #ddd;
  font-size: 15px;
  font-weight: 700;
  color: #666;
}

.cost-note span {
  color: #111;
  font-weight: 800;
}

    .detail-box {
      margin-top: 24px;
      background: #fff;
      border: 2px solid #cfcfcf;
      padding: 18px;
      font-size: 16px;
      line-height: 1.9;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    .detail-box strong {
      display: inline-block;
      min-width: 160px;
    }

    .note {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }

    @media (max-width: 900px) {
      .shirt-area {
        flex-direction: column;
        align-items: center;
      }

      .shirt-card {
        width: 100%;
        max-width: 420px;
      }

      .summary-row {
        grid-template-columns: 140px 1fr 50px;
      }

      .summary-label {
        font-size: 20px;
      }

      .summary-value {
        font-size: 42px;
      }

      .summary-unit {
        font-size: 36px;
      }
    }
    /* 胸元だけ幅を小さくする */
.front-left-chest,
.front-right-chest {
  width: 60px;
}
    /* 袖だけ幅を小さくする */
.front-left-shoulder,
.front-right-shoulder{
  width: 60px;
}
    /* 前後だけ幅を大きくする */
.front-center,
.back-center   {
  width: 150px;
  height: 150px;
}

  </style>
</head>
<body>
  <div class="container">
    <h1>社内用 売価計算システム</h1>

    <div class="top-form">
      <div class="form-label">ボディの種類</div>
      <div class="form-input">
        <select id="bodySelect"></select>
      </div>

      <div class="form-label">枚数</div>
      <div class="form-input">
        <input type="number" id="quantityInput" min="1" value="0" />
      </div>
    </div>

    <button id="resetBtn" class="reset-button">計算リセット</button>

    <div class="shirt-area">
      <div class="shirt-card">
        <div class="shirt-title">前面</div>
        <div class="shirt-image-wrap">
          <img src="前面イメージ.png" alt="Tシャツ前面" class="shirt-image" />

          <!-- 袖 -->
          <select class="overlay-select print-select front-left-shoulder" data-type="sleeve"></select>

          <!-- 胸 -->
          <select class="overlay-select print-select front-left-chest" data-type="chest"></select>
          <select class="overlay-select print-select front-right-chest" data-type="chest"></select>

          <!-- 前面大 -->
          <select class="overlay-select print-select front-center" data-type="big"></select>

          <!-- 袖 -->
          <select class="overlay-select print-select front-right-shoulder" data-type="sleeve"></select>
        </div>
      </div>

      <div class="shirt-card">
        <div class="shirt-title">背面</div>
        <div class="shirt-image-wrap">
          <img src="背面イメージ.png" alt="Tシャツ背面" class="shirt-image" />

          <!-- 背面大 -->
          <select class="overlay-select print-select back-center" data-type="big"></select>
        </div>
      </div>
    </div>

  <div class="summary">
  <div class="summary-card summary-card-sale">
    <div class="summary-card-label">通常売価</div>
    <div class="summary-card-value" id="salePrice">0</div>
  </div>

  <div class="summary-card">
    <div class="summary-card-label">最低価格（上司相談）</div>
    <div class="summary-card-value" id="minPrice">0</div>
  </div>
</div>

<div class="detail-box">
  <div><strong>ボディ代（1枚）</strong><span id="detailBody">0円</span></div>
  <div><strong>印刷代（1枚合計）</strong><span id="detailPrint">0円</span></div>
  <div><strong>輸送コスト</strong><span id="detailShipping">0円</span></div>
  <div><strong>消費税</strong><span>1.1倍</span></div>
  <div class="note">
    計算式：｛（（ボディ代＋印刷代）×枚数）＋輸送コスト｝×1.1 ÷ 枚数
  </div>
  <div class="cost-note">原価：<span id="costPrice">0</span></div>
</div>

  <script>
    // ========================================
    // 1. マスタ設定
    // ========================================

    // ボディ代（1枚あたり）
    const bodyMaster = [
      { id: "dry-shirt", name: "選択してください", price: 0 },
      { id: "dry-shirt", name: "ドライシャツ", price: 270 },
      { id: "cotton-shirt", name: "綿Tシャツ", price: 400 },
      { id: "long-sleeve", name: "ドライロンT", price: 390 },
      { id: "long-sleeve", name: "コットンロンT", price: 560 },
      { id: "polo", name: "ドライポロ", price: 500 },
      { id: "polo", name: "圧着ホッケー", price: 625 },
      { id: "polo", name: "圧着野球（ストライプなし）", price: 800 },
      { id: "polo", name: "圧着野球（ストライプあり）", price: 1000 },
      { id: "polo", name: "スウェット", price: 975 },
      { id: "polo", name: "パーカー", price: 1300 },
      { id: "polo", name: "ジップパーカー", price: 1600 }
    ];

    // 袖用プルダウン
    const sleeveOptions = [
      { id: "none", label: "なし", price: 0 },
      { id: "sleeve-1-normal", label: "通常カラー", price: 200 },
      { id: "sleeve-1-lame", label: "ラメカラー", price: 400 }
    ];

    // 胸元用プルダウン
    const chestOptions = [
      { id: "none", label: "なし", price: 0 },
      { id: "chest-1-normal", label: "通常カラー", price: 200 },
      { id: "chest-1-lame", label: "ラメカラー", price: 400 },
    ];

    // 前後の大きいデザイン用プルダウン
    const bigDesignOptions = [
      { id: "none", label: "なし", price: 0 },
      { id: "big-4-normal", label: "背ネーム/背番号", price: 300 },
      { id: "big-4-normal", label: "背ネーム/背番号（ラメ）", price: 300 },
      { id: "big-4-normal", label: "④（24cm×30cm）", price: 300 },
      { id: "big-4-lame", label: "④（ラメ）", price: 600 },
      { id: "big-5-normal", label: "⑤（30cm×40cm）", price: 500 },
      { id: "big-5-lame", label: "⑤（ラメ）", price: 800}
    ];

    // 運送コスト
    function getShippingCost(quantity) {
      return 3000;
    }

    // ========================================
    // 2. DOM取得
    // ========================================
    const bodySelect = document.getElementById("bodySelect");
    const quantityInput = document.getElementById("quantityInput");
    const printSelects = document.querySelectorAll(".print-select");

    const costPriceEl = document.getElementById("costPrice");
    const salePriceEl = document.getElementById("salePrice");
    const minPriceEl = document.getElementById("minPrice");

    const detailBodyEl = document.getElementById("detailBody");
    const detailPrintEl = document.getElementById("detailPrint");
    const detailShippingEl = document.getElementById("detailShipping");

    // ========================================
    // 3. 初期化
    // ========================================
    function initBodyOptions() {
      bodyMaster.forEach((body) => {
        const option = document.createElement("option");
        option.value = body.id;
        option.textContent = body.name;
        bodySelect.appendChild(option);
      });
    }

    function getOptionsByType(type) {
      if (type === "sleeve") return sleeveOptions;
      if (type === "chest") return chestOptions;
      if (type === "big") return bigDesignOptions;
      return [{ id: "none", label: "なし", price: 0 }];
    }

    function initPrintOptions() {
      printSelects.forEach((select) => {
        const type = select.dataset.type;
        const options = getOptionsByType(type);

        select.innerHTML = "";

        options.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.id;
          option.textContent = item.label;
          option.dataset.price = item.price;
          select.appendChild(option);
        });

        select.value = "none";
      });
    }

    // ========================================
    // 4. 計算処理
    // ========================================
    function getSelectedBody() {
      return bodyMaster.find((item) => item.id === bodySelect.value);
    }

    function getSelectedPrintTotalPerPiece() {
      let total = 0;

      printSelects.forEach((select) => {
        const selectedOption = select.options[select.selectedIndex];
        const price = Number(selectedOption?.dataset.price || 0);
        total += price;
      });

      return total;
    }

    function formatNumber(value) {
      return Math.round(value).toLocaleString("ja-JP");
    }

    function calculatePrice() {
      const body = getSelectedBody();
      const quantity = Number(quantityInput.value) || 0;

      if (!body || quantity <= 0) {
        costPriceEl.textContent = "0";
        salePriceEl.textContent = "0";
        minPriceEl.textContent = "0";

        detailBodyEl.textContent = "0円";
        detailPrintEl.textContent = "0円";
        detailShippingEl.textContent = "0円";
        return;
      }

      const bodyPrice = body.price;
      const printPricePerPiece = getSelectedPrintTotalPerPiece();
      const shipping = getShippingCost(quantity);

      // 原価（1枚あたり）
      const costPerPiece =
        ((((bodyPrice + printPricePerPiece) * quantity) + shipping) * 1.1) / quantity;

      // 売価・最低価格
      const salePrice = costPerPiece + 1000;
      const minPrice = costPerPiece + 500;

     costPriceEl.textContent = `¥${formatNumber(costPerPiece)}`;
salePriceEl.textContent = `¥${formatNumber(salePrice)}`;
minPriceEl.textContent = `¥${formatNumber(minPrice)}`;

      detailBodyEl.textContent = `${formatNumber(bodyPrice)}円`;
      detailPrintEl.textContent = `${formatNumber(printPricePerPiece)}円`;
      detailShippingEl.textContent = `${formatNumber(shipping)}円`;
    }

    // ========================================
    // 5. イベント
    // ========================================
    bodySelect.addEventListener("change", calculatePrice);
    quantityInput.addEventListener("input", calculatePrice);

    printSelects.forEach((select) => {
      select.addEventListener("change", calculatePrice);
    });

    // ========================================
    // 6. 実行
    // ========================================
    initBodyOptions();
    initPrintOptions();
    bodySelect.value = "dry-shirt";
    calculatePrice();

    
  </script>
<script>
const resetBtn = document.getElementById("resetBtn");

resetBtn.addEventListener("click", () => {

  // ボディ初期化
  bodySelect.value = "dry-shirt";

  // 枚数初期化
  quantityInput.value = 0;

  // 印刷プルダウン初期化
  printSelects.forEach(select => {
    select.value = "none";
  });

  // 再計算
  calculatePrice();
});

</script>

  const password = "0803";
  const input = prompt("パスワードを入力してください");

  if (input !== password) {
    document.body.innerHTML = "アクセスできません";
  }
</script>
</body>
</html>
